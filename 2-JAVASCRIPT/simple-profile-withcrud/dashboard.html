<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>

    <!-- NAVBAR -->
    <iframe src="components/navbar.html" class="iframe-nav" scrolling="no"></iframe>

    <!-- DASHBOARD LAYOUT -->
    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="sidebar-header">
                <h2>Admin Panel</h2>
            </div>

            <ul class="sidebar-menu">

                <li class="active">
                    <a href="#">
                        <i class="fas fa-home"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fas fa-users"></i>
                        Users
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fas fa-file-alt"></i>
                        Reports
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fas fa-cog"></i>
                        Settings
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="dashboard-content">

            <!-- Header -->
            <div class="dashboard-header">
                <h1>Dashboard</h1>
                <p>Selamat datang di halaman admin</p>
            </div>

            <!-- STAT CARDS -->
            <div class="stats-grid">

                <div class="stat-card">
                    <h3>Users</h3>
                    <p>120</p>
                </div>

                <div class="stat-card">
                    <h3>Projects</h3>
                    <p>45</p>
                </div>

                <div class="stat-card">
                    <h3>Messages</h3>
                    <p>89</p>
                </div>

                <div class="stat-card">
                    <h3>Revenue</h3>
                    <p>$2,540</p>
                </div>

            </div>

            <!-- CONTENT CARD -->
            <div class="content-card dashboard-card">

                <h2>Aktivitas Terbaru</h2>

                <p>
                    Ini adalah contoh area konten dashboard.
                    Anda bisa isi dengan tabel, grafik, atau laporan.
                </p>

            </div>

        </main>

    </div>


    <!-- FOOTER -->
    <iframe src="components/footer.html" class="iframe-footer" scrolling="no"></iframe>

</body>

</html>

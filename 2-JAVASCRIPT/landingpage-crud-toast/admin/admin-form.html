<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Artikel</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <!-- buat layout untuk dashboard adminnya -->
    <div class="admin-layout">
      <!-- SIDEBAR -->
      <div id="adminSidebar"></div>

      <!-- CONTENT -->
      <!-- wadah -->
      <main class="admin-content">
        <!-- pembungkus -->
        <div class="admin-form-wrapper">
          <!-- kartu nya atau form nya -->
          <div class="admin-form-card">
            <h2 id="formTitle">Tambah</h2>

            <div class="form-group">
              <label>Title</label>
              <input type="text" id="title" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" />
              </div>

              <div class="form-group">
                <label>Category</label>
                <select id="category">
                  <option>Website</option>
                  <option>Coding</option>
                  <option>Hobbies</option>
                  <option>Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Author</label>
              <input type="text" id="author" />
            </div>

            <div class="form-group">
              <label>Image</label>
              <input type="text" id="image" />
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea id="description"></textarea>
            </div>

            <!-- tombol buat fungsi simpan data -->
            <button onclick="saveData()" class="btn-primary">Simpan</button>
          </div>
        </div>
      </main>
      <!-- END OF CONTENT -->
    </div>

    <script src="/js/admin-sidebar.js"></script>
    <script src="/js/admin-form.js"></script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="admin-layout">
      <!-- SIDEBAR -->
      <div id="adminSidebar"></div>

      <!-- CONTENT -->
      <main class="admin-content">
        <div class="admin-header">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search article..."
              onkeyup="searchData()"
            />
          </div>

          <button
            class="btn-add"
            onclick="window.location.href = 'admin-form.html'"
          >
            <i class="fa-solid fa-plus"></i>
            Tambah
          </button>
        </div>

        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Date</th>
              <th>Author</th>
              <th>Category</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
        <!-- PAGINATION -->
        <div id="pagination" class="pagination"></div>
      </main>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div id="confirmModal" class="modal">
      <div class="modal-content">
        <h3>Konfirmasi Hapus</h3>
        <p>Yakin mau hapus data ini?</p>

        <div class="modal-actions">
          <button id="confirmYes" class="btn-danger">Ya, Hapus</button>
          <button id="confirmNo" class="btn-cancel">Batal</button>
        </div>
      </div>
    </div>
    <!-- END OF DELETE CONFIRM MODAL -->

    <!-- toast container -->
    <div id="toastContainer"></div>
    <!-- script -->
    <script src="/js/admin-sidebar.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <!-- input untuk id name atau buat masukin data -->
    <!-- button buat event atau action -->
    <input type="text" id="name" placeholder="Your name" />
    <button onclick="submitForm()">Submit</button>

    <!-- nampilin hasil -->
    <p id="result"></p>

    <script>
      function submitForm() {
        const name = document.getElementById("name").value;

        if (name === "") {
          document.getElementById("result").textContent = "Name is required!";
        } else {
          document.getElementById("result").textContent = "Hello " + name;
        }
      }
    </script>
  </body>
</html>
